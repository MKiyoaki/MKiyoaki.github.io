    <script>
    /**
     * 这个脚本将查找所有带有 `waves-background` 类的元素，并在其背景中创建一个动态波浪动画。
     * 通过 Hugo Blox 的 body-end hook 加载。
     */
    document.addEventListener('DOMContentLoaded', () => {
      const waveSections = document.querySelectorAll('.waves-background');
      waveSections.forEach(section => {
        initWavesForSection(section);
      });

          // 初始化极光背景
        const auroraSections = document.querySelectorAll('.aurora-background');
        auroraSections.forEach(section => {
          if (section) initAuroraForSection(section);
        });
    });

    /**
     * 为单个 section 元素初始化波浪画布和动画
     * @param {HTMLElement} sectionElement - 带有 `waves-background` 类的 section 元素
     */
    function initWavesForSection(sectionElement) {
      const container = document.createElement('div');
      container.className = 'waves-container-local';

      const canvas = document.createElement('canvas');
      canvas.className = 'waves-canvas-local';

      container.appendChild(canvas);
      sectionElement.prepend(container);

      const computedStyle = getComputedStyle(container);
      const lineColorFromCSS = computedStyle.getPropertyValue('--waves-line-color').trim();

      const config = {
        lineColor: lineColorFromCSS || 'rgba(0,0,0,0.2)',
        waveSpeedX: 0.0125,
        waveSpeedY: 0.005,
        waveAmpX: 16,
        waveAmpY: 8,
        xGap: 10,
        yGap: 32,
        friction: 0.925,
        tension: 0.005,
        maxCursorMove: 50,
      };

      const ctx = canvas.getContext('2d');
      let bounding = container.getBoundingClientRect();

      class Grad {
        constructor(x, y, z) { this.x = x; this.y = y; this.z = z; }
        dot2(x, y) { return this.x * x + this.y * y; }
      }

      class Noise {
        constructor(seed = 0) {
          this.grad3 = [new Grad(1,1,0),new Grad(-1,1,0),new Grad(1,-1,0),new Grad(-1,-1,0),new Grad(1,0,1),new Grad(-1,0,1),new Grad(1,0,-1),new Grad(-1,0,-1),new Grad(0,1,1),new Grad(0,-1,1),new Grad(0,1,-1),new Grad(0,-1,-1)];
          this.p = [151,160,137,91,90,15,131,13,201,95,96,53,194,233,7,225,140,36,103,30,69,142,8,99,37,240,21,10,23,190,6,148,247,120,234,75,0,26,197,62,94,252,219,203,117,35,11,32,57,177,33,88,237,149,56,87,174,20,125,136,171,168,68,175,74,165,71,134,139,48,27,166,77,146,158,231,83,111,229,122,60,211,133,230,220,105,92,41,55,46,245,40,244,102,143,54,65,25,63,161,1,216,80,73,209,76,132,187,208,89,18,169,200,196,135,130,116,188,159,86,164,100,109,198,173,186,3,64,52,217,226,250,124,123,5,202,38,147,118,126,255,82,85,212,207,206,59,227,47,16,58,17,182,189,28,42,223,183,170,213,119,248,152,2,44,154,163,70,221,153,101,155,167,43,172,9,129,22,39,253,19,98,108,110,79,113,224,232,178,185,112,104,218,246,97,228,251,34,242,193,238,210,144,12,191,179,162,241,81,51,145,235,249,14,239,107,49,192,214,31,181,199,106,157,184,84,204,176,115,121,50,45,127,4,150,254,138,236,205,93,222,114,67,29,24,72,243,141,128,195,78,66,215,61,156,180];
          this.perm = new Array(512);
          this.gradP = new Array(512);
          this.seed(seed);
        }
        seed(seed){if(seed>0&&seed<1)seed*=65536;seed=Math.floor(seed);if(seed<256)seed|=seed<<8;for(let i=0;i<256;i++){let v;v=(i&1)?this.p[i]^(seed&255):this.p[i]^((seed>>8)&255);this.perm[i]=this.perm[i+256]=v;this.gradP[i]=this.gradP[i+256]=this.grad3[v%12];}}
        fade(t){return t*t*t*(t*(t*6-15)+10);}
        lerp(a,b,t){return(1-t)*a+t*b;}
        perlin2(x,y){let X=Math.floor(x),Y=Math.floor(y);x-=X;y-=Y;X&=255;Y&=255;const n00=this.gradP[X+this.perm[Y]].dot2(x,y);const n01=this.gradP[X+this.perm[Y+1]].dot2(x,y-1);const n10=this.gradP[X+1+this.perm[Y]].dot2(x-1,y);const n11=this.gradP[X+1+this.perm[Y+1]].dot2(x-1,y-1);const u=this.fade(x);return this.lerp(this.lerp(n00,n10,u),this.lerp(n01,n11,u),this.fade(y));}
      }

      const noise = new Noise(Math.random());
      let lines = [];
      let mouse = { x: -10, y: 0, lx: 0, ly: 0, sx: 0, sy: 0, v: 0, vs: 0, a: 0, set: false };

      function setSize() {
        bounding = container.getBoundingClientRect();
        canvas.width = bounding.width;
        canvas.height = bounding.height;
      }

      function setLines() {
        const { width, height } = bounding;
        lines = [];
        const oWidth = width + 200, oHeight = height + 30;
        const totalLines = Math.ceil(oWidth / config.xGap);
        const totalPoints = Math.ceil(oHeight / config.yGap);
        const xStart = (width - config.xGap * totalLines) / 2;
        const yStart = (height - config.yGap * totalPoints) / 2;
        for (let i = 0; i <= totalLines; i++) {
          const pts = [];
          for (let j = 0; j <= totalPoints; j++) {
            pts.push({ x: xStart + config.xGap * i, y: yStart + config.yGap * j, wave: { x: 0, y: 0 }, cursor: { x: 0, y: 0, vx: 0, vy: 0 } });
          }
          lines.push(pts);
        }
      }

      function movePoints(time) {
        lines.forEach((pts) => {
          pts.forEach((p) => {
            const move = noise.perlin2((p.x + time * config.waveSpeedX) * 0.002, (p.y + time * config.waveSpeedY) * 0.0015) * 12;
            p.wave.x = Math.cos(move) * config.waveAmpX;
            p.wave.y = Math.sin(move) * config.waveAmpY;
            const dx = p.x - mouse.sx, dy = p.y - mouse.sy;
            const dist = Math.hypot(dx, dy), l = Math.max(175, mouse.vs);
            if (dist < l) {
              const s = 1 - dist / l;
              const f = Math.cos(dist * 0.001) * s;
              p.cursor.vx += Math.cos(mouse.a) * f * l * mouse.vs * 0.00065;
              p.cursor.vy += Math.sin(mouse.a) * f * l * mouse.vs * 0.00065;
            }
            p.cursor.vx += (0 - p.cursor.x) * config.tension;
            p.cursor.vy += (0 - p.cursor.y) * config.tension;
            p.cursor.vx *= config.friction;
            p.cursor.vy *= config.friction;
            p.cursor.x += p.cursor.vx * 2;
            p.cursor.y += p.cursor.vy * 2;
            p.cursor.x = Math.min(config.maxCursorMove, Math.max(-config.maxCursorMove, p.cursor.x));
            p.cursor.y = Math.min(config.maxCursorMove, Math.max(-config.maxCursorMove, p.cursor.y));
          });
        });
      }

      function moved(point, withCursor = true) {
        const x = point.x + point.wave.x + (withCursor ? point.cursor.x : 0);
        const y = point.y + point.wave.y + (withCursor ? point.cursor.y : 0);
        return { x: Math.round(x * 10) / 10, y: Math.round(y * 10) / 10 };
      }

      function drawLines() {
        const { width, height } = bounding;
        ctx.clearRect(0, 0, width, height);
        ctx.beginPath();
        ctx.strokeStyle = config.lineColor;
        lines.forEach((points) => {
          let p1 = moved(points[0], false);
          ctx.moveTo(p1.x, p1.y);
          points.forEach((p, idx) => {
            const isLast = idx === points.length - 1;
            p1 = moved(p, !isLast);
            const p2 = moved(points[idx + 1] || points[points.length - 1], !isLast);
            ctx.lineTo(p1.x, p1.y);
            if (isLast) ctx.moveTo(p2.x, p2.y);
          });
        });
        ctx.stroke();
      }

      function tick(t) {
        mouse.sx += (mouse.x - mouse.sx) * 0.1;
        mouse.sy += (mouse.y - mouse.sy) * 0.1;
        const dx = mouse.x - mouse.lx, dy = mouse.y - mouse.ly;
        const d = Math.hypot(dx, dy);
        mouse.v = d;
        mouse.vs += (d - mouse.vs) * 0.1;
        mouse.vs = Math.min(100, mouse.vs);
        mouse.lx = mouse.x;
        mouse.ly = mouse.y;
        mouse.a = Math.atan2(dy, dx);
        movePoints(t);
        drawLines();
        requestAnimationFrame(tick);
      }

      function updateMouse(x, y) {
        mouse.x = x - bounding.left;
        mouse.y = y - bounding.top;
        if (!mouse.set) {
          mouse.sx = mouse.x;
          mouse.sy = mouse.y;
          mouse.lx = mouse.x;
          mouse.ly = mouse.y;
          mouse.set = true;
        }
      }

      setSize();
      setLines();
      requestAnimationFrame(tick);

      window.addEventListener("resize", () => { setSize(); setLines(); });
      window.addEventListener("mousemove", (e) => updateMouse(e.clientX, e.clientY));
      window.addEventListener("touchmove", (e) => {
        if (e.touches[0]) updateMouse(e.touches[0].clientX, e.touches[0].clientY)
      }, { passive: false });
    }

    function initAuroraForSection(sectionElement) {
    if (typeof ogl === 'undefined') {
      console.error("OGL library is not loaded. Aurora effect cannot be initialized.");
      return;
    }

    const { Renderer, Program, Mesh, Color, Triangle } = ogl;

    const container = document.createElement('div');
    container.className = 'aurora-container';
    sectionElement.prepend(container);

    const vertex = `
      #version 300 es
      in vec2 position;
      void main() {
        gl_Position = vec4(position, 0.0, 1.0);
      }
    `;

    const fragment = `
      #version 300 es
      precision highp float;
      uniform float uTime;
      uniform float uAmplitude;
      uniform vec3 uColorStops[3];
      uniform vec2 uResolution;
      uniform float uBlend;
      out vec4 fragColor;
      vec3 permute(vec3 x) { return mod(((x * 34.0) + 1.0) * x, 289.0); }
      float snoise(vec2 v){ const vec4 C = vec4(0.211324865405187, 0.366025403784439, -0.577350269189626, 0.024390243902439); vec2 i = floor(v + dot(v, C.yy)); vec2 x0 = v - i + dot(i, C.xx); vec2 i1 = (x0.x > x0.y) ? vec2(1.0, 0.0) : vec2(0.0, 1.0); vec4 x12 = x0.xyxy + C.xxzz; x12.xy -= i1; i = mod(i, 289.0); vec3 p = permute(permute(i.y + vec3(0.0, i1.y, 1.0)) + i.x + vec3(0.0, i1.x, 1.0)); vec3 m = max(0.5 - vec3(dot(x0, x0), dot(x12.xy, x12.xy), dot(x12.zw, x12.zw)), 0.0); m = m * m; m = m * m; vec3 x = 2.0 * fract(p * C.www) - 1.0; vec3 h = abs(x) - 0.5; vec3 ox = floor(x + 0.5); vec3 a0 = x - ox; m *= 1.79284291400159 - 0.85373472095314 * (a0*a0 + h*h); vec3 g; g.x = a0.x * x0.x + h.x * x0.y; g.yz = a0.yz * x12.xz + h.yz * x12.yw; return 130.0 * dot(m, g); }
      struct ColorStop { vec3 color; float position; };
      #define COLOR_RAMP(colors, factor, finalColor) { int index = 0; for (int i = 0; i < 2; i++) { ColorStop currentColor = colors[i]; bool isInBetween = currentColor.position <= factor; index = int(mix(float(index), float(i), float(isInBetween))); } ColorStop currentColor = colors[index]; ColorStop nextColor = colors[index + 1]; float range = nextColor.position - currentColor.position; float lerpFactor = (factor - currentColor.position) / range; finalColor = mix(currentColor.color, nextColor.color, lerpFactor); }
      void main() {
        vec2 uv = gl_FragCoord.xy / uResolution;
        ColorStop colors[3];
        colors[0] = ColorStop(uColorStops[0], 0.0);
        colors[1] = ColorStop(uColorStops[1], 0.5);
        colors[2] = ColorStop(uColorStops[2], 1.0);
        vec3 rampColor;
        COLOR_RAMP(colors, uv.x, rampColor);
        float height = snoise(vec2(uv.x * 2.0 + uTime * 0.1, uTime * 0.25)) * 0.5 * uAmplitude;
        height = exp(height);
        height = (uv.y * 2.0 - height + 0.2);
        float intensity = 0.6 * height;
        float midPoint = 0.20;
        float auroraAlpha = smoothstep(midPoint - uBlend * 0.5, midPoint + uBlend * 0.5, intensity);
        vec3 auroraColor = intensity * rampColor;
        fragColor = vec4(auroraColor * auroraAlpha, auroraAlpha);
      }
    `;

    const renderer = new Renderer({
      alpha: true,
      premultipliedAlpha: true,
      antialias: true
    });
    const gl = renderer.gl;
    container.appendChild(gl.canvas);

    gl.clearColor(0, 0, 0, 0);
    gl.enable(gl.BLEND);
    gl.blendFunc(gl.ONE, gl.ONE_MINUS_SRC_ALPHA);

    let program;

    function resize() {
      const { width, height } = container.getBoundingClientRect();
      renderer.setSize(width, height);
      if (program) {
        program.uniforms.uResolution.value = [width, height];
      }
    }
    window.addEventListener("resize", resize, false);

    const geometry = new Triangle(gl);

    const colorStops = ["#7eb9ae", "#d22d7c", "#7eb9ae"];
    const amplitude = 1.0;
    const blend = 0.5;

    const colorStopsArray = colorStops.map((hex) => {
      const c = new Color(hex);
      return [c.r, c.g, c.b];
    });

    program = new Program(gl, {
      vertex,
      fragment,
      uniforms: {
        uTime: { value: 0 },
        uAmplitude: { value: amplitude },
        uColorStops: { value: colorStopsArray },
        uResolution: { value: [container.offsetWidth, container.offsetHeight] },
        uBlend: { value: blend }
      }
    });

    const mesh = new Mesh(gl, { geometry, program });

    resize();

    let lastTime = 0;
    requestAnimationFrame(update);
    function update(t) {
        requestAnimationFrame(update);
        const elapsed = t - lastTime;
        // Don't render if tab is in background
        if (elapsed < 16) return;
        lastTime = t;

        program.uniforms.uTime.value = t * 0.0001;
        renderer.render({ scene: mesh });
    }
  }
    </script>
